# Lesson3 — co-tenancy-tuned compose for the Rock 5B (runs alongside nanoclaw).
#
# Isolation choices:
#   - project name `lesson3` -> containers `lesson3-app-1`, `lesson3-postgres-1`
#     (never touches nanoclaw's `onecli` / `onecli-postgres-1`)
#   - dedicated Postgres with its own named volume
#   - Postgres has NO published host port -> reachable only by the app over the
#     internal compose network; cannot clash with onecli-postgres-1
#   - app published on host port 3001 (leaves 3000 free)
#   - mem/cpu caps so a build or bulk-generation can't starve nanoclaw
#
# On `up`, a one-shot `migrate` service applies pending Payload migrations before
# `app` starts (the prod app image has no Payload CLI). See the `migrate` service below.
#
# Bring up:   docker compose up -d --build
# Logs:       docker compose logs -f app          (migrate logs: docker compose logs migrate)
# Down:       docker compose down                 (data persists in the named volume)

name: lesson3

# Bound + rotate container logs so the structured (pino JSON) stream can't fill the disk and recent
# history is retained for `docker compose logs`. Applied per-service via the `logging:` anchor below.
# (Cross-deploy archival of logs is a separate follow-up; see docs/OPS.md "Structured logging".)
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  # One-shot schema migration, run before the app starts on every `up`.
  # The prod `app` image is a minimal Next standalone that lacks the Payload CLI,
  # so we run `payload migrate` from the Dockerfile's `builder` stage (full deps +
  # CLI + src/config). Idempotent: applies pending migrations from app/src/migrations,
  # then exits. `app` waits for it to complete successfully.
  migrate:
    build:
      context: ./app
      target: builder
    command: ["npx", "payload", "migrate"]
    env_file: .env
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    mem_limit: 1000m
    cpus: 2.0

  app:
    build: ./app                 # uses the Dockerfile generated by create-payload-app (scaffolded into ./app)
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "3001:3000"
    env_file: .env
    # Durable artifact cache (generated DOCX/PDF bytes). A named volume so it survives
    # `up --build` (which recreates the container) — without it the cache cold-starts on
    # every deploy. Must match ARTIFACT_CACHE_DIR in .env. Inspect via `docker volume`.
    volumes:
      - lesson3_artifact_cache:/var/cache/lesson3
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      gotenberg:
        condition: service_started
    mem_limit: 1500m
    cpus: 2.0

  # DOCX -> PDF conversion sidecar (SPEC §9). Gotenberg wraps a headless LibreOffice;
  # the app POSTs generated DOCX to it and gets back a faithful PDF (one source of layout
  # truth — we never re-render). Multi-arch (arm64), fully offline, no paid service.
  # Internal-only — NO published host port (same posture as postgres); reachable by the
  # app over the compose network at http://gotenberg:3000 (see GOTENBERG_URL in .env).
  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    logging: *default-logging
    # Disable the modules the app never calls, trimming the attack/startup surface.
    command:
      - gotenberg
      - --chromium-disable-javascript=true
      - --api-timeout=120s
    mem_limit: 1024m
    cpus: 2.0

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: lesson3
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: lesson3
    volumes:
      - lesson3_pgdata:/var/lib/postgresql/data
    # intentionally NO `ports:` — internal-only, isolated from nanoclaw's Postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lesson3 -d lesson3"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    cpus: 1.0

volumes:
  lesson3_pgdata:
  lesson3_artifact_cache:
